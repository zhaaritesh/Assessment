appId: com.anonymous.rnme
name: "Favorites - Add, Verify Detail & Remove"

---

- runFlow: ../auth/_login_helper.yaml

- waitForAnimationToEnd

# ── Add a movie from Browse ───────────────────────────────────────────────────
- tapOn:
    point: "50%, 32%"

- waitForAnimationToEnd

- tapOn:
    text: "Save"

- waitForAnimationToEnd

- assertVisible:
    text: "Saved"
    label: "Movie marked as saved"

- back

- waitForAnimationToEnd

# ── Favorites tab shows the saved movie ──────────────────────────────────────
- tapOn:
    text: "Favorites"

- waitForAnimationToEnd

- assertNotVisible:
    text: "No saved films yet"
    label: "Saved movie appears in Favorites tab"

# ── Verify full detail from Favorites ────────────────────────────────────────
- tapOn:
    point: "50%, 20%"

- waitForAnimationToEnd

- assertVisible:
    text: "RELEASED"
    label: "Release date section visible in movie detail"

- assertVisible:
    text: "RATING"
    label: "Rating section visible in movie detail"

- assertVisible:
    text: "Saved"
    label: "Movie shows as already-saved when opened from Favorites"

# ── Remove from favorites (also serves as cleanup) ────────────────────────────
- tapOn:
    text: "Saved"

- waitForAnimationToEnd

- assertVisible:
    text: "Save"
    label: "Button reverts to Save after removing"

- back

- waitForAnimationToEnd

# ── Empty state shown after removal ──────────────────────────────────────────
- assertVisible:
    text: "No saved films yet"
    label: "Empty state shown when all favorites removed"
