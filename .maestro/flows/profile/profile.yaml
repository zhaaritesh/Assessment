appId: com.anonymous.rnme
name: "Profile - Theme Toggle & Sign Out"

---

- runFlow: ../auth/_login_helper.yaml

# Navigate to Profile tab
- tapOn:
    text: "Profile"

- waitForAnimationToEnd

- assertVisible:
    text: "Profile"
    label: "Profile screen loads"

# ── Verify all theme options are rendered ─────────────────────────────────────
- assertVisible:
    text: "Light"
    label: "Light theme option present"

- assertVisible:
    text: "Dark"
    label: "Dark theme option present"

- assertVisible:
    text: "System"
    label: "System theme option present"

# ── Theme toggle — screenshot after each change for visual audit ──────────────
- tapOn:
    label: "Dark"

- waitForAnimationToEnd

- takeScreenshot: theme-dark

- tapOn:
    label: "Light"

- waitForAnimationToEnd

- takeScreenshot: theme-light

- tapOn:
    label: "System"

- waitForAnimationToEnd

- takeScreenshot: theme-system

# ── Theme persists across tabs ────────────────────────────────────────────────
- tapOn:
    text: "Browse"

- tapOn:
    text: "Profile"

- waitForAnimationToEnd

- assertVisible:
    text: "Profile"
    label: "Theme preference stays after tab switch"

# ── Sign out ──────────────────────────────────────────────────────────────────
- tapOn:
    text: "Sign out"

- waitForAnimationToEnd

- assertVisible:
    text: "Sign in"
    label: "Sign out returns to Login screen"
