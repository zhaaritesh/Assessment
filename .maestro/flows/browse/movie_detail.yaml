appId: com.anonymous.rnme
name: "Browse - Movie Detail"

---

- runFlow: ../auth/_login_helper.yaml

- waitForAnimationToEnd

# Tap the first movie card (coordinate-based — avoids brittle index/regex selectors)
- tapOn:
    point: "50%, 32%"

- waitForAnimationToEnd

# ── Detail screen metadata assertions ────────────────────────────────────────
- assertVisible:
    text: "RELEASED"
    label: "Detail screen shows release date section"

- assertVisible:
    text: "RATING"
    label: "Detail screen shows rating section"

- assertVisible:
    text: "RUNTIME"
    label: "Detail screen shows runtime section"

- assertVisible:
    text: "Trailer"
    label: "Trailer button present"

# ── Save toggle ───────────────────────────────────────────────────────────────
- tapOn:
    text: "Save"

- waitForAnimationToEnd

- assertVisible:
    text: "Saved"
    label: "Button changes to Saved after toggling on"

# Toggle back off
- tapOn:
    text: "Saved"

- waitForAnimationToEnd

- assertVisible:
    text: "Save"
    label: "Button reverts to Save after toggling off"

# ── Back navigation ───────────────────────────────────────────────────────────
- back

- waitForAnimationToEnd

- assertVisible:
    text: "Browse"
    label: "Back returns to Browse screen"
