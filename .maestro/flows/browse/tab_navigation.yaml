appId: com.anonymous.rnme
name: "Navigation - Tab Bar Smoke Test"

---

- runFlow: ../auth/_login_helper.yaml

- waitForAnimationToEnd

# Home tab (default)
- assertVisible:
    text: "Home"
    label: "Home tab visible after login"

# Favorites tab
- tapOn:
    text: "Favorites"
- waitForAnimationToEnd
- assertVisible:
    text: "Favorites"
    label: "Favorites tab navigates correctly"

# Profile tab
- tapOn:
    text: "Profile"
- waitForAnimationToEnd
- assertVisible:
    text: "Profile"
    label: "Profile tab navigates correctly"

# Back to Home
- tapOn:
    text: "Home"
- waitForAnimationToEnd
- assertVisible:
    text: "Home"
    label: "Returns to Home from Profile"
