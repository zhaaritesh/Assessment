appId: com.anonymous.rnme
name: "Browse - Movie List & Search"

---

# ── Default state on fresh load ───────────────────────────────────────────────
- runFlow: ../auth/_login_helper.yaml

- assertVisible:
    text: "Browse"
    label: "Browse tab is active after login"

- extendedWaitUntil:
    visible:
      text: "Popular right now"
    timeout: 20000

- assertVisible:
    text: "Popular right now"
    label: "Movie list populates from TMDb API"

# ── Search happy path ─────────────────────────────────────────────────────────
- tapOn:
    text: "Search movies by title"

- inputText: "Inception"

- extendedWaitUntil:
    visible:
      text: "Inception"
    timeout: 10000

- assertVisible:
    text: "Inception"
    label: "Search returns matching result"

# ── No-results empty state (fresh session to avoid search state carry-over) ───
- runFlow: ../auth/_login_helper.yaml

- extendedWaitUntil:
    visible:
      text: "Popular right now"
    timeout: 20000

- tapOn:
    text: "Search movies by title"

- inputText: "xyzzy12345notamovie"

- extendedWaitUntil:
    visible:
      text: "No films match that search"
    timeout: 10000

- assertVisible:
    text: "No films match that search"
    label: "Empty state shown for unmatched query"
