appId: com.anonymous.rnme
name: "Auth - Login"

---

- launchApp:
    clearState: true

- assertVisible:
    text: "Sign in"
    label: "Login screen loads on cold start"

- tapOn:
    text: "Email"
- inputText: "test@rnme.com"

- tapOn:
    text: "Password"
- inputText: "Test123$$"

- tapOn:
    text: "Log in"

- waitForAnimationToEnd

- assertVisible:
    text: "Home"
    label: "Lands on Home tab after successful login"
