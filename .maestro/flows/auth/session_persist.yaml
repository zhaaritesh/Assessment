appId: com.anonymous.rnme
name: "Auth - Session Persists After Restart"

---

- runFlow: ../auth/_login_helper.yaml

# Restart without clearing state
- launchApp:
    clearState: false

- waitForAnimationToEnd

- assertVisible:
    text: "Browse"
    label: "User stays logged in after app restart (redux-persist)"

- assertNotVisible:
    text: "Sign in"
    label: "Login screen NOT shown when session is active"
